<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Discovery v4 — Admin Preview</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --accent: #2c5282;
      --accent-light: #ebf4ff;
      --s1-color: #2c5282;
      --s2-color: #6b46c1;
      --s3-color: #b7791f;
      --synth-color: #276749;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
    .admin-header p { margin: 0; color: var(--muted); font-size: 14px; }

    .admin-nav {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .admin-nav a {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 20px;
      text-decoration: none;
      color: var(--accent);
      background: var(--accent-light);
      transition: background 0.2s;
    }
    .admin-nav a:hover { background: #d4e6ff; }

    .admin-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 32px 80px;
    }

    .section { margin-bottom: 48px; }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .section-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: #f9f9f9; }
    .card-header .badge {
      display: inline-block;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 12px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .card-header .title {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }
    .card-header .chevron {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .card-header .chevron.open { transform: rotate(90deg); }

    .card-body {
      padding: 20px;
      display: none;
    }
    .card-body.open { display: block; }

    .question-text {
      font-size: 15px;
      line-height: 1.65;
      padding: 14px 18px;
      background: #f7f7f5;
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      margin-bottom: 12px;
    }

    .prompt-block { margin-top: 8px; }
    .prompt-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .prompt-text {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 16px 18px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      max-height: 500px;
      overflow-y: auto;
    }
    .prompt-text .placeholder { color: #63b3ed; }

    .config-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 8px 16px;
      font-size: 14px;
    }
    .config-key {
      font-weight: 600;
      color: var(--muted);
    }
    .config-val {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .flow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .flow-step {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }
    .flow-arrow {
      font-size: 18px;
      color: var(--muted);
    }
    .flow-label {
      font-size: 11px;
      color: var(--muted);
      display: block;
      text-align: center;
    }

    .routing-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 12px;
    }
    .routing-table th {
      text-align: left;
      padding: 8px 12px;
      background: #f5f5f5;
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .routing-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    .routing-table code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .bg-s1 { background: var(--s1-color); }
    .bg-s2 { background: var(--s2-color); }
    .bg-s3 { background: var(--s3-color); }
    .bg-synth { background: var(--synth-color); }
    .bg-gray { background: #888; }
    .bg-pitch { background: #c53030; }

    .file-ref {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      padding: 12px 16px;
      background: var(--accent-light);
      border-radius: 6px;
      margin-top: 12px;
    }

    .data-callout {
      font-size: 13px;
      padding: 10px 14px;
      background: #f0fdf4;
      border-left: 3px solid #276749;
      border-radius: 0 6px 6px 0;
      margin-top: 8px;
      color: #276749;
    }

    @media (max-width: 700px) {
      .admin-header { padding: 16px; }
      .admin-body { padding: 16px 16px 60px; }
      .prompt-text { font-size: 12px; padding: 12px; }
      .config-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="admin-header">
  <h1>Career Discovery v4 — Admin Preview</h1>
  <p>Read-only view of all stages, question bank, system prompt, and configuration.
    To edit, modify <span class="file-ref">questions.js</span>, <span class="file-ref">prompts.js</span>, and <span class="file-ref">config.js</span> and push.</p>
  <nav class="admin-nav">
    <a href="#flow">Flow</a>
    <a href="#config">Config</a>
    <a href="#stage1">Stage 1</a>
    <a href="#stage2">Stage 2</a>
    <a href="#stage3">Stage 3</a>
    <a href="#synthesis">Synthesis</a>
    <a href="#prompt">System Prompt</a>
  </nav>
</header>

<div class="admin-body" id="admin-content">
  <noscript><p>JavaScript is required to render this page.</p></noscript>
  <p id="admin-loading" style="color:var(--muted);font-size:14px;">Loading content...</p>
</div>

<script type="module">
// Remove loading message once module executes
const loadingMsg = document.getElementById('admin-loading');
if (loadingMsg) loadingMsg.remove();
import { STAGE_1_FRAME, STAGE_1_QUESTION, STAGE_2_QUESTION, STAGE_3_BANK } from './questions.js';
import { SYSTEM_PROMPT } from './prompts.js';
import { CONFIG } from './config.js';

const $ = (tag, cls, html) => {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html) el.innerHTML = html;
  return el;
};

const container = document.getElementById('admin-content');

function highlightPrompt(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\{([^}]+)\}/g, '<span class="placeholder">{$1}</span>');
}

function makeCard(badgeText, badgeClass, title, body, startOpen = false) {
  const card = $('div', 'card');
  const header = $('div', 'card-header');
  header.innerHTML = `
    <span class="badge ${badgeClass}">${badgeText}</span>
    <span class="title">${title}</span>
    <span class="chevron ${startOpen ? 'open' : ''}">&rsaquo;</span>
  `;
  const bodyEl = $('div', `card-body ${startOpen ? 'open' : ''}`);
  if (typeof body === 'string') {
    bodyEl.innerHTML = body;
  } else {
    bodyEl.appendChild(body);
  }
  header.addEventListener('click', () => {
    bodyEl.classList.toggle('open');
    header.querySelector('.chevron').classList.toggle('open');
  });
  card.appendChild(header);
  card.appendChild(bodyEl);
  return card;
}

function esc(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* ======= Conversation Flow ======= */
const flowSection = $('div', 'section');
flowSection.id = 'flow';
flowSection.innerHTML = `
  <h2 class="section-title">Conversation Flow</h2>
  <p class="section-subtitle">3 stages with AI deepening, transitions, two-part synthesis, and optional pitch</p>
  <div class="flow">
    <div>
      <div class="flow-step bg-s1">Stage 1</div>
      <span class="flow-label">Fixed Q</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-gray" style="font-size:11px;padding:6px 10px;">AI Deepening</div>
      <span class="flow-label">0-2 follow-ups</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-gray" style="font-size:11px;padding:6px 10px;">Transition</div>
      <span class="flow-label">AI-generated</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-s2">Stage 2</div>
      <span class="flow-label">Data-layered</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-gray" style="font-size:11px;padding:6px 10px;">AI Deepening</div>
      <span class="flow-label">Up to 3 layers</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-gray" style="font-size:11px;padding:6px 10px;">Transition</div>
      <span class="flow-label">AI-generated</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-s3">Stage 3</div>
      <span class="flow-label">1 of 5</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-gray" style="font-size:11px;padding:6px 10px;">AI Deepening</div>
      <span class="flow-label">0-2 follow-ups</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-synth">Brief</div>
      <span class="flow-label">Collapsible</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-gray" style="font-size:11px;padding:6px 10px;">Reaction?</div>
      <span class="flow-label">Optional</span>
    </div>
    <span class="flow-arrow">&rarr;</span>
    <div>
      <div class="flow-step bg-pitch">Pitch</div>
      <span class="flow-label">Separate</span>
    </div>
  </div>
  <p style="font-size:13px;color:var(--muted);">
    Stage 1 has a framing line. Stage 2 uses data-layered deepening (skills-based hiring, authenticity).
    AI generates personalized transitions between stages. Synthesis outputs two parts: Career Intelligence Brief
    (collapsible sections) and Pitch assessment (separate "Want to Go Deeper?" section).
  </p>
  <div class="note">
    <strong>Key v4 changes:</strong> Two-part synthesis, AI-generated transitions, data-layered Stage 2 deepening,
    collapsible brief sections, exponential backoff for synthesis calls, escaped newline fix.
  </div>
`;
container.appendChild(flowSection);

/* ======= Config ======= */
const configSection = $('div', 'section');
configSection.id = 'config';
configSection.innerHTML = `
  <h2 class="section-title">Configuration</h2>
  <p class="section-subtitle">From <span class="file-ref">config.js</span></p>
  <div class="config-grid">
    <span class="config-key">API Endpoint</span>
    <span class="config-val">${esc(CONFIG.api_endpoint)}</span>
    <span class="config-key">Model</span>
    <span class="config-val">${esc(CONFIG.model)}</span>
    <span class="config-key">Max Tokens</span>
    <span class="config-val">${CONFIG.max_tokens}</span>
    <span class="config-key">Synthesis Timeout</span>
    <span class="config-val">${CONFIG.synthesis_timeout_ms}ms</span>
    <span class="config-key">Retry Delays</span>
    <span class="config-val">[${CONFIG.retry_delays.join(', ')}]ms</span>
    <span class="config-key">Form Version</span>
    <span class="config-val">${esc(CONFIG.form_version)}</span>
    <span class="config-key">Dates Placeholder</span>
    <span class="config-val">${esc(CONFIG.dates_placeholder)}</span>
    <span class="config-key">Link Placeholder</span>
    <span class="config-val">${esc(CONFIG.link_placeholder)}</span>
  </div>
`;
container.appendChild(configSection);

/* ======= Stage 1 ======= */
const s1Section = $('div', 'section');
s1Section.id = 'stage1';
s1Section.innerHTML = `
  <h2 class="section-title">Stage 1 — Your Situation</h2>
  <p class="section-subtitle">Frame text + fixed question.
    From <span class="file-ref">questions.js</span></p>
`;
s1Section.appendChild(makeCard('Frame', 'bg-s1', 'Stage 1 Frame', `
  <div class="question-text" style="border-left-color:var(--s1-color);font-style:italic">${esc(STAGE_1_FRAME)}</div>
`, true));
s1Section.appendChild(makeCard('Stage 1', 'bg-s1', 'Opening Question', `
  <div class="question-text" style="border-left-color:var(--s1-color)">${esc(STAGE_1_QUESTION)}</div>
`, true));
container.appendChild(s1Section);

/* ======= Stage 2 ======= */
const s2Section = $('div', 'section');
s2Section.id = 'stage2';
s2Section.innerHTML = `
  <h2 class="section-title">Stage 2 — Their Perspective</h2>
  <p class="section-subtitle">Data-layered recruiter perspective with three deepening layers.
    From <span class="file-ref">questions.js</span></p>
`;
s2Section.appendChild(makeCard('Stage 2', 'bg-s2', 'Recruiter Perspective Question', `
  <div class="question-text" style="border-left-color:var(--s2-color)">${esc(STAGE_2_QUESTION)}</div>
  <div class="data-callout">
    <strong>Data sources:</strong> Entry-level postings down 15% (Handshake 2025), applications per posting up 30% (NACE 2025)
  </div>
  <div class="note" style="margin-top:16px">
    <strong>Three deepening layers:</strong><br>
    <strong>Layer 1 — Skills-based hiring:</strong> 70% of employers shifted to skills-based hiring; fewer than 40% of seniors know.<br>
    <strong>Layer 2 — Authenticity:</strong> Growing number of AI-generated applications; recruiters looking for signals of authenticity.<br>
    <strong>Layer 3 — Insight confirmed:</strong> Student gets it on their own — affirm and advance.
  </div>
`, true));
container.appendChild(s2Section);

/* ======= Stage 3 ======= */
const s3Section = $('div', 'section');
s3Section.id = 'stage3';
s3Section.innerHTML = `
  <h2 class="section-title">Stage 3 — Your Direction</h2>
  <p class="section-subtitle">AI selects one of 5 questions based on information gap. AI-generated transition precedes the question.
    From <span class="file-ref">questions.js</span></p>
`;

s3Section.appendChild(makeCard('Routing', 'bg-s3', 'Stage 2 → Stage 3 Question Selection', `
  <p style="font-size:13px;color:var(--muted);margin:0 0 8px;">
    When advancing from Stage 2, the AI selects the Stage 3 question that fills the biggest information gap:
  </p>
  <table class="routing-table">
    <tr><th>ID</th><th>Label</th><th>When to select</th></tr>
    <tr><td><code>q3_a</code></td><td>Motivation</td><td>Surface-level on motivation — told you what, not why</td></tr>
    <tr><td><code>q3_b</code></td><td>Broaden</td><td>Narrow and strategic — clear plan but tunnel vision</td></tr>
    <tr><td><code>q3_c</code></td><td>Value</td><td>Has real experiences but doesn't see their own value</td></tr>
    <tr><td><code>q3_d</code></td><td>Re-engage</td><td>Disengaged, giving minimal responses</td></tr>
    <tr><td><code>q3_e</code></td><td>Ground</td><td>Abstract throughout — needs a concrete experience</td></tr>
  </table>
`, true));

const q3ids = ['q3_a', 'q3_b', 'q3_c', 'q3_d', 'q3_e'];
q3ids.forEach(id => {
  const q = STAGE_3_BANK[id];
  s3Section.appendChild(makeCard(q.label, 'bg-s3', `${id} — ${q.label}`, `
    <div class="question-text" style="border-left-color:var(--s3-color)">${esc(q.text)}</div>
  `));
});
container.appendChild(s3Section);

/* ======= Synthesis Structure ======= */
const synthSection = $('div', 'section');
synthSection.id = 'synthesis';
synthSection.innerHTML = `
  <h2 class="section-title">Two-Part Synthesis</h2>
  <p class="section-subtitle">AI generates a Career Intelligence Brief and a separate pitch assessment</p>
`;
synthSection.appendChild(makeCard('Part 1', 'bg-synth', 'Career Intelligence Brief (Collapsible Card)', `
  <p style="font-size:13px;color:var(--muted);margin:0 0 12px;">
    Four collapsible sections. First section expanded by default. Each shows a preview line when collapsed.
  </p>
  <table class="routing-table">
    <tr><th>Section</th><th>Content</th><th>Default</th></tr>
    <tr><td><strong>Where You Are</strong></td><td>2-3 sentences. Honest situation read.</td><td>Expanded</td></tr>
    <tr><td><strong>What I See</strong></td><td>2-3 observations + woven human+AI point (replaces "What Just Happened")</td><td>Collapsed</td></tr>
    <tr><td><strong>A Direction Worth Exploring</strong></td><td>1-2 specific role types/niches</td><td>Collapsed</td></tr>
    <tr><td><strong>Your First Move</strong></td><td>One actionable step for this week</td><td>Collapsed</td></tr>
  </table>
  <div class="note" style="margin-top:12px">
    <strong>No more "What Just Happened" section.</strong> The human+AI insight is now woven into "What I See" as ONE specific sentence using the student's actual example.
  </div>
`, true));
synthSection.appendChild(makeCard('Part 2', 'bg-pitch', 'Pitch: "Want to Go Deeper?" (Separate Section)', `
  <p style="font-size:13px;color:var(--muted);margin:0 0 12px;">
    Appears after the brief + optional reaction step. Separate visual treatment — lighter background, smaller text.
  </p>
  <p style="font-size:13px;margin:0 0 8px;"><strong>Opening:</strong> "What you just experienced was a 15-minute version of a process we've been developing."</p>
  <p style="font-size:13px;margin:0 0 8px;"><strong>"Good next step if:"</strong> 2-3 personalized bullet points from THIS conversation</p>
  <p style="font-size:13px;margin:0 0 8px;"><strong>"Not best use of time if:"</strong> Strategic approach already in place, different need (grad school, gap), already getting callbacks</p>
  <p style="font-size:13px;margin:0;"><strong>CTA:</strong> Session dates + link, or "dates coming soon" message</p>
`, true));
container.appendChild(synthSection);

/* ======= System Prompt ======= */
const promptSection = $('div', 'section');
promptSection.id = 'prompt';
promptSection.innerHTML = `
  <h2 class="section-title">System Prompt</h2>
  <p class="section-subtitle">Single prompt handles all stages, deepening with data layers, transitions, two-part synthesis, and adjustment.
    From <span class="file-ref">prompts.js</span></p>
`;
promptSection.appendChild(makeCard('Prompt', 'bg-synth', 'Full System Prompt', `
  <div class="prompt-block">
    <div class="prompt-label">System Prompt &mdash; sent with every AI call</div>
    <div class="prompt-text">${highlightPrompt(SYSTEM_PROMPT)}</div>
  </div>
`, true));
container.appendChild(promptSection);

</script>

<script>
// Fallback: if module script fails to load, show an error message
window.addEventListener('load', () => {
  const content = document.getElementById('admin-content');
  const loading = document.getElementById('admin-loading');
  if (loading) {
    loading.innerHTML = '<strong>Failed to load content.</strong> ES modules may not be supported. ' +
      'Make sure you are serving this page via HTTP (not opening the file directly). ' +
      'Try: <code>python3 -m http.server</code> in the career-intelligence folder, then visit <code>http://localhost:8000/admin.html</code>';
    loading.style.color = '#c53030';
  }
});
</script>
</body>
</html>
