name: Nightly Grading

on:
  schedule:
    - cron: '0 5 * * *'  # 9 PM PDT / midnight EDT

concurrency:
  group: nightly-grading
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private data repo
        env:
          DATA_REPO_PAT: ${{ secrets.DATA_REPO_PAT }}
        run: |
          git clone "https://x-access-token:${DATA_REPO_PAT}@github.com/profsathya/Common-Curriculum-Data.git" data-repo 2>&1 || true
          if [ ! -d "data-repo/.git" ]; then
            echo "Empty repo — initializing..."
            mkdir -p data-repo
            cd data-repo
            git init
            git remote add origin "https://x-access-token:${DATA_REPO_PAT}@github.com/profsathya/Common-Curriculum-Data.git"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "CST349 — Download, Grade, Analyze, Dashboard"
        continue-on-error: true
        env:
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/submission-analyzer.js --action=full --course=cst349 --data-dir=./data-repo

      - name: "CST395 — Download, Grade, Analyze, Dashboard"
        continue-on-error: true
        env:
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/submission-analyzer.js --action=full --course=cst395 --data-dir=./data-repo

      - name: Push results to data repo
        if: always()
        env:
          DATA_REPO_PAT: ${{ secrets.DATA_REPO_PAT }}
        working-directory: data-repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if [[ -n $(git status --porcelain) ]]; then
            git add -A
            git commit -m "Nightly grading run — $(date -u +%Y-%m-%d)"

            if git rev-parse --verify origin/main >/dev/null 2>&1; then
              git push
            else
              git branch -M main
              git push -u origin main
            fi
            echo "✓ Results pushed to data repo"
          else
            echo "No changes to push"
          fi
